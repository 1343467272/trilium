name: Mobile

on:
  pull_request:
    paths:
      - "apps/mobile/**"
      - ".github/workflows/mobile.yml"
      - ".github/actions/build-mobile/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Build mobile APK
        uses: ./.github/actions/build-mobile

  build_ios:
    name: Build iOS App
    # iOS builds require Xcode, which is only available on macOS runners.
    runs-on: macos-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update build info
        run: pnpm run chore:update-build-info

      - name: Build client-standalone (webDir for Capacitor)
        run: pnpm --filter @triliumnext/mobile build

      - name: Sync Capacitor iOS project
        run: |
          if [ ! -d "apps/mobile/ios" ]; then
            echo "iOS platform folder not found, adding it now..."
            pnpm --filter @triliumnext/mobile exec cap add ios
          fi
          pnpm --filter @triliumnext/mobile exec cap sync ios

      # 1. 更改为构建真机架构的未签名 App
      - name: Build iOS app for Device (unsigned)
        working-directory: apps/mobile/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      # 2. 创建 Payload 目录并打包为标准的 .ipa 文件
      - name: Package IPA (unsigned)
        working-directory: apps/mobile/ios/App/build/Build/Products/Debug-iphoneos
        run: |
          mkdir Payload
          cp -r App.app Payload/
          zip -ry App.ipa Payload

      # 3. 收集并上传生成的 .ipa 产物
      - name: Upload iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: trilium-mobile-ios-ipa
          path: apps/mobile/ios/App/build/Build/Products/Debug-iphoneos/App.ipa
          retention-days: 14
